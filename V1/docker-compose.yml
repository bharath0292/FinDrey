services:
  api:
    build: backend
    command: "uvicorn app.main:app --host 0.0.0.0 --port 5000"
    environment:
      - ENVIRONMENT=DEVELOPMENT
      - API_AUTH_TOKEN=findrey
      - MONGO_USERNAME=bharath0292
      - MONGO_PASSWORD=Findrey@123
    ports:
      - 5000:5000

  client:
    build: frontend
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - 3000:80
    links:
      - api
    depends_on:
      - api
