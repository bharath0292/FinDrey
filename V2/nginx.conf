# Main Nginx configuration file
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging (optional)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Server block for reverse proxy
    server {
        listen 80;

        # Proxy requests to Next.js
        location / {
            proxy_pass http://client:3000;  # Ensure 'client' matches Docker Compose service
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy requests to the Go API
        location /api/ {
            rewrite ^/api(/.*)$ $1 break;   # Strip the `/api` prefix before forwarding
            proxy_pass http://server:8080; # Ensure 'server' matches Docker Compose service
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
