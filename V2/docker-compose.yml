services:
  go:
    build:
      context: ./findrey-server/
      dockerfile: go.Dockerfile
    image: findrey/server:v1
    container_name: server
    ports:
      - "8080:8080"
    networks:
      - app-network
    environment:
      - SERVICE_NAME=server
      - SERVICE_PORT=8080

  next:
    build:
      context: ./findrey-client/
      dockerfile: next.Dockerfile
    image: findrey/client:v1
    container_name: client
    ports:
      - "3000:3000"
    networks:
      - app-network
    environment:
      - SERVICE_NAME=client
      - SERVICE_PORT=3000

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go
      - next
    networks:
      - app-network

networks:
  app-network:
    driver: bridge